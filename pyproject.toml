[project]
name = "pancli"
version = "2.0.0"
description = "A modernized stateful REPL CLI for AnyShare (Beihang Netdisk)"
readme = "README.md"
authors = [{ name = "LZR" }]
dependencies = [
    "httpx>=0.27.0",
    "platformdirs>=4.2.0",
    "prompt-toolkit>=3.0.43",
    "pydantic>=2.7.0",
    "rich>=13.7.1",
    "rsa>=4.9",
    "typer>=0.12.0",
]
requires-python = ">=3.10"

[project.scripts]
bhpan = "pancli.main:cli"
pancli = "pancli.main:cli"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
